$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for requirement entries in 030-requirements.kb/
type: object
additionalProperties: false
required:
  - why
properties:
  why:
    description: Upward traceability — goals or peer requirements this requirement serves
    type: array
    items:
      type: string
    minItems: 1
  background:
    description: Background entries that inform this requirement
    type: array
    items:
      type: string

[project]
name = "bukzor.chatgpt-export"
version = "0.1.0"
description = "Extract and splat ChatGPT conversations from HAR exports"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
chatgpt-har2jsonl = "bukzor.chatgpt_export.har2jsonl:main"
chatgpt-splat = "bukzor.chatgpt_export.splat:main"

[project.optional-dependencies]
dev = ["pytest", "pytest-pyright", "pyright>=1.1.405"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lib/bukzor"]

[tool.pytest.ini_options]
python_classes = ["Describe*", "When*", "Test*"]
python_functions = ["it_*", "test_*"]
[tool.pyright]
typeCheckingMode = "strict"
analyzeUnannotatedFunctions = true
reportIncompatibleMethodOverride = "error"
pythonVersion = "3.13"
enableTypeIgnoreComments = true
reportPrivateUsage = "warning"
reportConstantRedefinition = "error"
reportIncompatibleVariableOverride = "error"
reportMissingImports = "error"
reportMissingTypeStubs = false
exclude = [".venv", "__pycache__", "typesafety"]
